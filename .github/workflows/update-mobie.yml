name: update-mobie

on:
  repository_dispatch:
    types:
      - mobie_release

permissions:
  contents: write
  pull-requests: write

jobs:
  update-formula:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Render formula
        env:
          VERSION: ${{ github.event.client_payload.version }}
          ARM_URL: ${{ github.event.client_payload.macos_arm64.url }}
          ARM_SHA: ${{ github.event.client_payload.macos_arm64.sha256 }}
          INTEL_URL: ${{ github.event.client_payload.macos_amd64.url }}
          INTEL_SHA: ${{ github.event.client_payload.macos_amd64.sha256 }}
        run: |
          bash ./scripts/render-mobie-formula.sh \
            "${VERSION}" \
            "${ARM_URL}" \
            "${ARM_SHA}" \
            "${INTEL_URL}" \
            "${INTEL_SHA}"

      - name: Commit formula update
        env:
          VERSION: ${{ github.event.client_payload.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [[ -z "$(git status --porcelain -- Formula/mobie.rb)" ]]; then
            echo "Formula/mobie.rb already up to date"
            exit 0
          fi

          git add Formula/mobie.rb
          git commit -m "Update mobie to v${VERSION}"

      - name: Open pull request
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_PR_TOKEN }}
          DEFAULT_GH_TOKEN: ${{ github.token }}
          VERSION: ${{ github.event.client_payload.version }}
        run: |
          branch="update-mobie-v${VERSION}"
          using_default_token=0

          if [[ -z "${GH_TOKEN}" ]]; then
            GH_TOKEN="${DEFAULT_GH_TOKEN}"
            using_default_token=1
          fi

          git switch -c "${branch}"
          git push --force-with-lease origin "${branch}"

          if gh pr view "${branch}" --json number >/dev/null 2>&1; then
            gh pr edit "${branch}" \
              --title "Update mobie to v${VERSION}" \
              --body "Automated formula update for mobie v${VERSION}."
          else
            if [[ "${using_default_token}" -eq 1 ]]; then
              echo "warning: using default github.token; if PR creation is disabled for GitHub Actions, set HOMEBREW_TAP_PR_TOKEN to a PAT with repo scope" >&2
            fi
            gh pr create \
              --head "${branch}" \
              --base main \
              --title "Update mobie to v${VERSION}" \
              --body "Automated formula update for mobie v${VERSION}."
          fi
